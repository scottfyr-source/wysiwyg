<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Walmart Sheet Generator</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 900px; margin: auto; }
        h1, h2 { color: #333; }
        .form-grid { display: grid; grid-template-columns: 150px 1fr; gap: 10px; align-items: center; margin-bottom: 20px;}
        label { font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { min-height: 80px; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #generateCsvBtn { background-color: #28a745; }
        #generateCsvBtn:hover { background-color: #218838; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Walmart Data Entry</h1>
            <div>
                <button id="loadDataBtn">Load Data from Builder</button>
                <button id="clearAllBtn" style="background-color: #dc3545; margin-left: 5px; margin-right: 5px;">Clear All Fields</button>
                <button id="generateCsvBtn">Generate & Download CSV</button>
            </div>
        </div>

        <form id="walmartForm">
            <h2>Product Information</h2>
            <div class="form-grid">
                <label for="productName">Product Name</label>
                <input type="text" id="productName" name="productName">

                <label for="title">Title</label>
                <input type="text" id="title" name="title">

                <label for="performer">Performer (+)</label>
                <input type="text" id="performer" name="performer">

                <label for="sellingPrice">Selling Price</label>
                <input type="text" id="sellingPrice" name="sellingPrice" placeholder="Pull from Discogs manually for now">

                <label for="siteDescription">Site Description</label>
                <textarea id="siteDescription" name="siteDescription"></textarea>
            </div>

            <h2>Identifiers & Details</h2>
            <div class="form-grid">
                <label for="manufacturerPartNumber">Manuf. Part Number</label>
                <input type="text" id="manufacturerPartNumber" name="manufacturerPartNumber">

                <label for="recordLabel">Record Label</label>
                <input type="text" id="recordLabel" name="recordLabel">

                <label for="originalReleaseDate">Original Release Date</label>
                <input type="text" id="originalReleaseDate" name="originalReleaseDate" placeholder="YYYY-MM-DD">
            </div>

            <h2>Format & Genre</h2>
            <div class="form-grid">
                <label for="mediaFormat">Media Format (+)</label>
                <select id="mediaFormat" name="mediaFormat"><option value="">Loading...</option></select>

                <label for="musicMediaFormat">Music Media Format (+)</label>
                <select id="musicMediaFormat" name="musicMediaFormat"><option value="">Loading...</option></select>

                <label for="musicGenre">Music Genre (+)</label>
                <select id="musicGenre" name="musicGenre"><option value="Pop">Pop</option></select>
            </div>
        </form>
    </div>
    <script src="/WalmartSheet/walmart.js"></script>
    <script>
        // Embedded walmart.js to ensure it always loads
        document.addEventListener('DOMContentLoaded', () => {
            initializeDropdowns();
            
            // Automatically try to load data when the page opens
            loadDataFromBuilder();

            const loadDataBtn = document.getElementById('loadDataBtn');
            if (loadDataBtn) {
                // Keep the button for manual re-loading
                loadDataBtn.addEventListener('click', loadDataFromBuilder);
            }

            const clearAllBtn = document.getElementById('clearAllBtn');
            if (clearAllBtn) {
                clearAllBtn.addEventListener('click', () => {
                    document.getElementById('walmartForm').reset();
                    // Also clear the server cache
                    fetch('/api/walmart/cache-context', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({})
                    }).catch(e => console.error("Failed to clear server cache on manual clear.", e));
                    
                    const loadBtn = document.getElementById('loadDataBtn');
                    loadBtn.textContent = 'Load Data from Builder'; // Reset button text
                });
            }

            const generateCsvBtn = document.getElementById('generateCsvBtn');
            if (generateCsvBtn) {
                generateCsvBtn.addEventListener('click', generateCsv);
            }
        });

        async function initializeDropdowns() {
            try {
                const resp = await fetch('/settings');
                if (!resp.ok) throw new Error("Settings fetch failed");
                const settings = await resp.json();

                populateSelect('mediaFormat', settings["Media Format"]);
                populateSelect('musicMediaFormat', settings["Media Format"]); // Reuse Media Format
                populateSelect('musicGenre', settings["Music Genre"] || ["Pop", "Rock", "Country", "Hip Hop", "Jazz", "Classical"]);
                
            } catch (e) {
                console.error("Failed to load dropdowns:", e);
                document.getElementById('mediaFormat').innerHTML = '<option value="">Error loading</option>';
                document.getElementById('musicMediaFormat').innerHTML = '<option value="">Error loading</option>';
                document.getElementById('musicGenre').innerHTML = '<option value="">Error loading</option>';
            }
        }

        function populateSelect(id, options) {
            const sel = document.getElementById(id);
            if (!sel || !options) return;
            sel.innerHTML = '<option value="">-- Select --</option>';
            options.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt;
                el.textContent = opt;
                sel.appendChild(el);
            });
        }

        async function loadDataFromBuilder() {
            const btn = document.getElementById('loadDataBtn');
            btn.textContent = 'Loading...';
            btn.disabled = true;

            // This function will be used to clear the cache.
            const clearServerCache = () => {
                fetch('/api/walmart/cache-context', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                }).catch(e => console.error("Failed to clear server cache.", e));
            };

            try {
                const contextResp = await fetch('/api/walmart/cache-context');
                if (!contextResp.ok) {
                    // Don't throw an error, just means no data to load.
                    clearServerCache(); // Clear any partial/bad cache
                    return;
                }
                const context = await contextResp.json();
                
                // As soon as we have the data, clear the cache to prevent stale reloads.
                clearServerCache();
                
                // If the cache was empty, don't proceed.
                if (Object.keys(context).length === 0) {
                    document.getElementById('walmartForm').reset(); // Clear form if no data
                    return;
                }

                const response = await fetch('/api/walmart/process-item', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(context)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || `Server responded with status ${response.status}`);
                }

                const data = await response.json();
                
                document.getElementById('productName').value = data.productName || '';
                document.getElementById('title').value = data.title || '';
                document.getElementById('performer').value = data.performer || '';
                document.getElementById('sellingPrice').value = data.sellingPrice || '';
                document.getElementById('siteDescription').value = data.siteDescription || '';
                document.getElementById('manufacturerPartNumber').value = data.manufacturerPartNumber || '';
                document.getElementById('recordLabel').value = data.recordLabel || '';
                document.getElementById('originalReleaseDate').value = data.originalReleaseDate || '';
                document.getElementById('mediaFormat').value = data.mediaFormat || '';
                document.getElementById('musicMediaFormat').value = data.musicMediaFormat || '';
                document.getElementById('musicGenre').value = data.musicGenre || 'Pop';

                btn.textContent = '✅ Loaded';
                setTimeout(() => { btn.textContent = 'Load Data from Builder'; }, 2000);

            } catch (error) {
                console.error('Failed to load data:', error);
                alert('Failed to load data: ' + error.message);
                btn.textContent = 'Error!';
                // Also clear cache on error
                clearServerCache();
            } finally {
                btn.disabled = false;
            }
        }

        function generateCsv() {
            alert('CSV generation from this screen is not yet implemented. Use the data to fill your spreadsheet manually.');
        }
    </script>
</body>
</html>
