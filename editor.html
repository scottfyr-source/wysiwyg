<!DOCTYPE html>
<html>
<head>
    <title>WYSIWYG - Settings Manager</title>
    <link rel="icon" type="image/png" href="/fyrlogo.png">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="editor-container">
        <div style="background: var(--wysiwyg-blue); color: var(--wysiwyg-yellow); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 2px solid var(--wysiwyg-yellow); box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="margin: 0; padding: 0; background: none; border: none; color: inherit; font-size: 24px; letter-spacing: 2px;">WYSIWYG</h2>
            <h4 style="margin: 5px 0 0 0; color: white; font-weight: normal; opacity: 0.9;">Dropdown Content Editor</h4>
        </div>
        
        <p style="font-size: 14px; color: var(--text-muted); text-align: center;">Add or remove items for your listing tool dropdowns. Changes only take effect after clicking Save.</p>
        <input type="text" id="searchBar" placeholder="🔍 Filter categories..." oninput="renderUI()" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box;">
        
        <div id="editorUI">Loading your settings...</div>

        <!-- Version Control Section -->
        <div style="margin-top: 20px; padding: 15px; background: var(--version-bg); border: 1px solid var(--version-border); border-radius: 4px;">
            <h3 style="color: var(--version-title); margin-top: 0; font-size: 14px;">Version Control</h3>
            <div style="display: flex; gap: 10px; align-items: flex-end;">
                <div style="flex: 1;">
                    <label style="font-size: 11px; font-weight: bold; display:block;">Major</label>
                    <input type="number" id="vMajor" style="width: 100%; box-sizing: border-box;">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 11px; font-weight: bold; display:block;">Minor</label>
                    <input type="number" id="vMinor" style="width: 100%; box-sizing: border-box;">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 11px; font-weight: bold; display:block;">Bugfix</label>
                    <input type="number" id="vPatch" style="width: 100%; box-sizing: border-box;">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 11px; font-weight: bold; display:block;">Build</label>
                    <input type="number" id="vBuild" style="width: 100%; box-sizing: border-box;">
                </div>
            </div>
            <textarea id="vChangelog" rows="3" style="width: 100%; box-sizing: border-box; margin-top: 10px; border: 1px solid var(--border-color); border-radius: 4px; padding: 5px; font-family: sans-serif;" placeholder="Enter changelog notes here... (will be appended to changelog.txt)"></textarea>
            <div style="text-align: right; margin-top: 5px;">
                <button onclick="updateVersion()" style="background: #0d47a1; color: white; border: none; padding: 9px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; height: 35px;">Update</button>
            </div>
        </div>

        <!-- Developer Actions -->
        <div style="margin-top: 20px; padding: 15px; background: var(--dev-bg); border: 1px solid var(--dev-border); border-radius: 4px;">
            <h3 style="color: var(--dev-title); margin-top: 0; font-size: 14px;">Developer Actions</h3>
            <div style="display: flex; gap: 10px;">
                <button onclick="pushVersionToServer()" style="background: #ffc107; color: black; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">⬆️ Push Version to Server</button>
                <button onclick="viewRequests()" style="background: #17a2b8; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">📜 View Requests</button>
            </div>
        </div>

        <div style="margin-top: 20px; padding-top: 15px; border-top: 2px dashed #eee;">
            <h3 style="color: #28a745; font-size: 14px;">+ Create New Category</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="newCatInput" placeholder="New Category Name">
                <button onclick="addCategory()" style="background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">Create</button>
            </div>
        </div>
    </div>

    <div class="save-bar">
        <button id="saveBtn" onclick="saveData()">💾 Save All Changes</button>
        <button id="uploadBtn" onclick="uploadMenus()" style="margin-left: 15px;">⬆️ Upload Menus</button>
        <button id="openConditionsBtn" onclick="openConditions()" style="margin-left: 15px; background: #28a745; color: white; border: none; padding: 15px 40px; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold;">⚙️ Conditions</button>
        <button id="exitBtn" onclick="window.close()" style="margin-left: 15px;">❌ Exit Editor</button>
    </div>

    <!-- Conditions Modal -->
    <div id="conditionsModal" class="modal" style="z-index: 3000;">
        <div class="modal-content" style="width: 98vw; height: 98vh; margin: 1vh auto; padding: 0; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; max-width: none;">
            <!-- Modal Header -->
            <div style="background: var(--wysiwyg-blue); color: var(--wysiwyg-yellow); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--wysiwyg-yellow);">
                <h2 style="margin: 0; background: none; border: none; color: inherit; font-size: 20px;">Manage Conditions</h2>
                <span class="close-btn" onclick="closeConditionsModal()" style="color: white; top: 12px; font-size: 30px;">&times;</span>
            </div>
            
            <!-- Scrollable Content Area -->
            <div id="conditionsEditorContainer" style="flex: 1; overflow-y: auto; padding: 25px; background: var(--bg-content);"></div>
            
            <!-- Fixed Footer with Buttons -->
            <div style="padding: 20px 25px; background: var(--save-bar-bg); border-top: 2px solid var(--wysiwyg-blue); display: flex; justify-content: flex-end; gap: 15px;">
                <button onclick="closeConditionsModal()" style="background: #6c757d; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;">Cancel</button>
                <button onclick="syncConditions()" style="background: #28a745; color: white; border: none; padding: 12px 40px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">🚀 Update To Server</button>
            </div>
        </div>
    </div>


    <!-- Requests Viewer Modal -->
    <div id="requestsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeRequestsModal()">&times;</span>
            <h3 style="margin-top: 0; color: var(--text-main);">Feature Requests</h3>
            <textarea id="requestsContent" readonly style="width: 100%; height: 400px; resize: vertical; font-family: monospace; padding: 10px; box-sizing: border-box; background: var(--input-bg); color: var(--input-text); border: 1px solid var(--border-color);"></textarea>
            <div style="text-align: right; margin-top: 10px;">
                <button onclick="closeRequestsModal()" style="background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Apply theme on load
        const savedTheme = localStorage.getItem('wysiwyg_theme');
        if (savedTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }

        let currentData = {};
        let collapsedCategories = new Set();

        // Added Pre FM and Post FM to the required fields list
        const requiredFields = [
            "Pre FM",
            "Post FM",
            "Color",
            "Specific Format",
            "Media Descriptor",
            "Sleeve Desc",
            "Packaging Feature",
            "Slash Separated Editions"
        ];

        // --- THEME LOGIC ---
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                body.removeAttribute('data-theme');
                localStorage.setItem('wysiwyg_theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('wysiwyg_theme', 'dark');
            }
        }

        async function loadData() {
            try {
                const resp = await fetch('/settings'); 
                if (!resp.ok) throw new Error(`HTTP error! status: ${resp.status}`);
                
                const result = await resp.json();
                if (result.error) {
                    document.getElementById('editorUI').innerHTML = 
                        `<div style="color:red; padding:10px; border:1px solid red;">
                            <strong>Path Error:</strong><br>${result.error}
                         </div>`;
                    return;
                }

                // Initialize any missing required fields as empty arrays
                requiredFields.forEach(field => {
                    if (!result[field]) {
                        result[field] = [];
                    }
                });

                currentData = result;
                
                // Collapse all categories by default
                Object.keys(currentData).forEach(cat => collapsedCategories.add(cat));
                renderUI();
                loadVersion();
            } catch (err) {
                document.getElementById('editorUI').innerHTML = 
                    `<p style="color:red;">Failed to connect to server: ${err.message}</p>`;
            }
        }

        function renderUI() {
            const container = document.getElementById('editorUI');
            const filter = document.getElementById('searchBar') ? document.getElementById('searchBar').value.toLowerCase() : "";
            container.innerHTML = '';

            // Generate a block for every category in the data
            for (const [category, items] of Object.entries(currentData)) {
                if (filter && !category.toLowerCase().includes(filter)) continue;

                const div = document.createElement('div');
                div.className = 'category-block';
                
                const isCollapsed = collapsedCategories.has(category);
                const displayStyle = isCollapsed ? 'none' : 'block';
                const arrow = isCollapsed ? '▶' : '▼';

                div.innerHTML = `
                    <div class="category-header" onclick="toggleCategory('${category}')">
                        <h3>${category}</h3>
                        <span style="font-size: 12px; color: var(--text-muted);">${arrow}</span>
                    </div>
                    <div class="category-content" id="content-${category}" style="display: ${displayStyle};">
                        <div style="text-align: right; margin-bottom: 10px;">
                            <button onclick="removeCategory('${category}')" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px;">Delete Category</button>
                        </div>
                        <div class="tag-list" id="list-${category}">
                            ${items.map((item, index) => `
                                <div class="tag-item">
                                    ${item} 
                                    ${index > 0 ? `<button class="move-btn" onclick="moveToTop('${category}', ${index})" title="Send to Top">↑↑</button>` : ''}
                                    ${index > 0 ? `<button class="move-btn" onclick="moveItem('${category}', ${index}, -1)" title="Move Up">↑</button>` : ''}
                                    ${index < items.length - 1 ? `<button class="move-btn" onclick="moveItem('${category}', ${index}, 1)" title="Move Down">↓</button>` : ''}
                                    ${index < items.length - 1 ? `<button class="move-btn" onclick="moveToBottom('${category}', ${index})" title="Send to Bottom">↓↓</button>` : ''}
                                    <button class="del-btn" onclick="removeItem('${category}', ${index})">×</button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="add-row">
                            <input type="text" id="input-${category}" placeholder="Add new item to ${category}...">
                            <button style="padding: 8px 15px; cursor: pointer;" onclick="addItem('${category}')">Add</button>
                        </div>
                    </div>
                `; 
                container.appendChild(div);
            }
        }

        function toggleCategory(cat) {
            if (collapsedCategories.has(cat)) {
                collapsedCategories.delete(cat);
            } else {
                collapsedCategories.add(cat);
            }
            renderUI();
        }

        function expandAll() {
            collapsedCategories.clear();
            renderUI();
        }

        function collapseAll() {
            Object.keys(currentData).forEach(cat => collapsedCategories.add(cat));
            renderUI();
        }

        function removeCategory(cat) {
            if (confirm(`Are you sure you want to delete the category "${cat}"? This cannot be undone.`)) {
                delete currentData[cat];
                renderUI();
            }
        }

        function removeItem(cat, index) {
            currentData[cat].splice(index, 1);
            renderUI();
        }

        function moveToTop(cat, index) {
            const items = currentData[cat];
            if (index > 0) {
                const item = items.splice(index, 1)[0];
                items.unshift(item);
                renderUI();
            }
        }

        function moveToBottom(cat, index) {
            const items = currentData[cat];
            if (index < items.length - 1) {
                const item = items.splice(index, 1)[0];
                items.push(item);
                renderUI();
            }
        }

        function moveItem(cat, index, direction) {
            const items = currentData[cat];
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < items.length) {
                [items[index], items[newIndex]] = [items[newIndex], items[index]];
                renderUI();
            }
        }

        function addItem(cat) {
            const inputEl = document.getElementById(`input-${cat}`);
            const val = inputEl.value.trim();
            if (val) {
                currentData[cat].push(val);
                inputEl.value = ''; 
                renderUI();
            }
        }

        function addCategory() {
            const input = document.getElementById('newCatInput');
            const name = input.value.trim();
            if (!name) return;
            if (currentData[name]) { alert("Category already exists!"); return; }
            
            currentData[name] = [];
            input.value = "";
            renderUI();
        }

        async function loadVersion() {
            try {
                const resp = await fetch('/api/version');
                const v = await resp.json();
                document.getElementById('vMajor').value = v.major;
                document.getElementById('vMinor').value = v.minor;
                document.getElementById('vPatch').value = v.patch;
                document.getElementById('vBuild').value = v.build || 0;
            } catch(e) { console.error(e); }
        }

        async function updateVersion() {
            const major = document.getElementById('vMajor').value;
            const minor = document.getElementById('vMinor').value;
            const patch = document.getElementById('vPatch').value;
            const build = document.getElementById('vBuild').value;
            const changelog = document.getElementById('vChangelog').value;
            
            try {
                const resp = await fetch('/api/version', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ major, minor, patch, build, changelog })
                });
                const res = await resp.json();
                if(res.status === 'success') alert("Version updated to " + major + "." + minor + "." + patch + "." + build);
                else alert("Error updating version");
            } catch(e) { alert("Error: " + e); }
        }

        async function pushVersionToServer() {
            if(!confirm("Push local version.json and changelog.txt to Z: drive?")) return;
            try {
                const resp = await fetch('/api/push-version', {method: 'POST'});
                const res = await resp.json();
                alert(res.message);
            } catch(e) { alert("Error: " + e); }
        }

        async function viewRequests() {
            try {
                const resp = await fetch('/api/view-requests');
                const res = await resp.json();
                if (res.status === 'success') {
                    document.getElementById('requestsContent').value = res.content || "No requests found.";
                    document.getElementById('requestsModal').style.display = 'block';
                } else {
                    alert("Error: " + res.message);
                }
            } catch(e) { alert("Error: " + e); }
        }

        function closeRequestsModal() {
            document.getElementById('requestsModal').style.display = 'none';
        }

        async function saveData() {
            try {
                const resp = await fetch('/save-settings', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentData)
                });
                if (resp.ok) alert("Settings saved successfully!");
                else alert("Save failed. Check server connection.");
            } catch (err) {
                alert("Error saving: " + err.message);
            }
        }

        async function uploadMenus() {
            if(!confirm("Upload local menus to server? This will backup the existing server file.")) return;
            try {
                const resp = await fetch('/upload-menus', {method: 'POST'});
                const res = await resp.json();
                alert(res.message);
            } catch(e) { alert("Error: " + e); }
        }

        // --- Conditions Management Logic ---
        let localConditions = { cassette: [], cd: [], lp: [] };

        async function openConditions() {
            try {
                // User requested ONLY load the server side file
                const resp = await fetch('/api/conditions?master=true');
                localConditions = await resp.json();
                renderConditionsEditor();
                document.getElementById('conditionsModal').style.display = 'block';
            } catch(e) { alert("Error loading conditions: " + e); }
        }

        function closeConditionsModal() {
            document.getElementById('conditionsModal').style.display = 'none';
        }

        function renderConditionsEditor() {
            const container = document.getElementById('conditionsEditorContainer');
            container.innerHTML = '';

            const categories = [
                { key: 'lp', label: 'LP (Vinyl) Conditions' },
                { key: 'cd', label: 'CD Conditions' },
                { key: 'cassette', label: 'Cassette Conditions' }
            ];

            // Create a flex container for side-by-side layout
            const flexBox = document.createElement('div');
            flexBox.style.cssText = 'display: flex; gap: 25px; align-items: flex-start;';

            categories.forEach(cat => {
                const section = document.createElement('div');
                section.style.cssText = 'flex: 1; min-width: 250px; background: rgba(0,0,0,0.02); padding: 15px; border-radius: 8px; border: 1px solid #eee;';
                
                const title = document.createElement('h4');
                title.innerText = cat.label;
                title.style.cssText = 'border-bottom: 2px solid var(--wysiwyg-blue); padding-bottom: 8px; margin-bottom: 15px; color: var(--wysiwyg-blue); font-weight: bold; text-align: center; text-transform: uppercase; letter-spacing: 1px;';
                section.appendChild(title);

                const list = document.createElement('div');
                list.id = `list-${cat.key}`;
                
                // Sort by title alphabetically
                const items = localConditions[cat.key] || [];
                items.sort((a, b) => a.title.localeCompare(b.title));

                items.forEach((item, index) => {
                    const row = createConditionRow(cat.key, index, item);
                    list.appendChild(row);
                });

                const addBtn = document.createElement('button');
                addBtn.innerText = '+ Add New Item';
                addBtn.style.cssText = 'width: 100%; margin-top: 15px; background: #007bff; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s;';
                addBtn.onmouseover = () => { addBtn.style.background = '#0056b3'; };
                addBtn.onmouseout = () => { addBtn.style.background = '#007bff'; };
                addBtn.onclick = () => addNewItem(cat.key);
                
                section.appendChild(list);
                section.appendChild(addBtn);
                flexBox.appendChild(section);
            });

            container.appendChild(flexBox);
        }

        function createConditionRow(catKey, index, item) {
            const row = document.createElement('div');
            row.style.cssText = 'display: flex; gap: 10px; margin-bottom: 8px; align-items: center;';
            
            const titleInput = document.createElement('input');
            titleInput.type = 'text';
            titleInput.value = item.title;
            titleInput.placeholder = 'Title (e.g. Tearing)';
            titleInput.style.cssText = 'flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; background: var(--input-bg); color: var(--input-text);';
            titleInput.onchange = (e) => { localConditions[catKey][index].title = e.target.value; };

            const textInput = document.createElement('input');
            textInput.type = 'text';
            textInput.value = item.text;
            textInput.placeholder = 'Generated Text (e.g. cellophane tearing)';
            textInput.style.cssText = 'flex: 2; padding: 6px; border: 1px solid #ccc; border-radius: 4px; background: var(--input-bg); color: var(--input-text);';
            textInput.onchange = (e) => { localConditions[catKey][index].text = e.target.value; };

            const delBtn = document.createElement('button');
            delBtn.innerText = '🗑️';
            delBtn.style.cssText = 'background: #dc3545; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer;';
            delBtn.onclick = () => {
                localConditions[catKey].splice(index, 1);
                renderConditionsEditor();
            };

            row.appendChild(titleInput);
            row.appendChild(textInput);
            row.appendChild(delBtn);
            return row;
        }

        function addNewItem(catKey) {
            if (!localConditions[catKey]) localConditions[catKey] = [];
            localConditions[catKey].push({ title: '', text: '' });
            renderConditionsEditor();
        }

        async function syncConditions() {
            if (!confirm("This will overwrite the Conditions.json file on the network server (\\\\192.168.0.108). Proceed?")) return;
            
            // Sort before saving
            Object.keys(localConditions).forEach(cat => {
                localConditions[cat].sort((a, b) => a.title.localeCompare(b.title));
            });

            try {
                const resp = await fetch('/api/admin/sync-conditions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(localConditions)
                });
                const res = await resp.json();
                if (res.status === 'success') {
                    alert("Success: " + res.message);
                    closeConditionsModal();
                } else {
                    alert("Error: " + res.message);
                }
            } catch(e) { alert("Network Error: " + e); }
        }

        loadData();
    </script>
</body>
</html>
